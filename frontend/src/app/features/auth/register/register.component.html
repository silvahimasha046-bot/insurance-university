<div class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-[520px] rounded-xl shadow-2xl border border-gray-200 dark:border-[#324d67] bg-white dark:bg-[#101922] overflow-hidden">
    <div class="flex items-center p-4 justify-between">
      <div class="flex size-12 items-center justify-center text-gray-900 dark:text-white cursor-pointer" routerLink="/">
        <span class="material-symbols-outlined">close</span>
      </div>
      <h2 class="text-gray-900 dark:text-white text-lg font-bold flex-1 text-center pr-12">Registration</h2>
    </div>

    <div class="px-4">
      <h2 class="text-gray-900 dark:text-white text-[28px] font-bold leading-tight pb-2 pt-2">Create your account</h2>
      <p class="text-gray-600 dark:text-[#92adc9] text-base pb-3">
        Get unbiased insurance policy recommendations tailored for you.
      </p>
    </div>

    <div *ngIf="errorMessage" class="px-4 pb-2">
      <p class="text-red-500 text-sm font-medium flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">error</span>
        {{ errorMessage }}
      </p>
    </div>

    <div class="px-4 space-y-4 pb-6">
      <label class="block">
        <p class="text-gray-900 dark:text-white font-medium pb-2">Full Name</p>
        <input [(ngModel)]="name"
          class="w-full h-14 rounded-lg border border-gray-300 dark:border-[#324d67] bg-white dark:bg-[#192633] px-4 text-gray-900 dark:text-white placeholder:text-gray-400 dark:placeholder:text-[#92adc9] focus:border-primary focus:ring-0"
          placeholder="Enter your full name" />
      </label>

      <label class="block">
        <p class="text-gray-900 dark:text-white font-medium pb-2">Email Address</p>
        <input [(ngModel)]="email"
          class="w-full h-14 rounded-lg border border-gray-300 dark:border-[#324d67] bg-white dark:bg-[#192633] px-4 text-gray-900 dark:text-white placeholder:text-gray-400 dark:placeholder:text-[#92adc9] focus:border-primary focus:ring-0"
          placeholder="Enter your email" type="email" />
      </label>

      <label class="block">
        <p class="text-gray-900 dark:text-white font-medium pb-2">Create Password</p>
        <input [(ngModel)]="password" (keyup.enter)="register()"
          class="w-full h-14 rounded-lg border border-gray-300 dark:border-[#324d67] bg-white dark:bg-[#192633] px-4 text-gray-900 dark:text-white placeholder:text-gray-400 dark:placeholder:text-[#92adc9] focus:border-primary focus:ring-0"
          placeholder="Create a password" type="password" />
        <p class="text-gray-500 dark:text-[#92adc9] text-xs pt-2">Min 8 chars</p>
      </label>

      <button (click)="register()" [disabled]="loading"
        class="w-full bg-primary hover:bg-primary/90 text-white text-base font-bold h-12 rounded-lg disabled:opacity-60">
        {{ loading ? 'Creating account…' : 'Create Account' }}
      </button>

      <div class="text-center text-sm text-gray-600 dark:text-[#92adc9]">
        Already have an account?
        <a class="text-primary font-bold hover:underline" routerLink="/login">Log In</a>
      </div>

      <div class="text-center">
        <a class="text-primary font-bold" routerLink="/">Back to landing</a>
      </div>
    </div>
  </div>
</div>
