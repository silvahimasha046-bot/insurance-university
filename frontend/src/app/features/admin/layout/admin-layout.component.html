<div class="flex h-screen bg-gray-900 text-white">
  <!-- Sidebar -->
  <aside class="w-56 bg-gray-800 flex flex-col">
    <div class="p-4 border-b border-gray-700">
      <span class="text-lg font-bold text-blue-400">Admin Panel</span>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a routerLink="/admin/dashboard" routerLinkActive="bg-blue-700"
         class="block px-3 py-2 rounded hover:bg-gray-700 transition-colors">Dashboard</a>
      <a routerLink="/admin/categories" routerLinkActive="bg-blue-700"
        class="block px-3 py-2 rounded hover:bg-gray-700 transition-colors">Categories</a>
      <a routerLink="/admin/products" routerLinkActive="bg-blue-700"
         class="block px-3 py-2 rounded hover:bg-gray-700 transition-colors">Products</a>
      <a routerLink="/admin/rules" routerLinkActive="bg-blue-700"
         class="block px-3 py-2 rounded hover:bg-gray-700 transition-colors">Rules &amp; Pricing</a>
      <a routerLink="/admin/training" routerLinkActive="bg-blue-700"
         class="block px-3 py-2 rounded hover:bg-gray-700 transition-colors">Training Data</a>
      <a routerLink="/admin/logs" routerLinkActive="bg-blue-700"
         class="block px-3 py-2 rounded hover:bg-gray-700 transition-colors">Logs</a>
      <a routerLink="/admin/insights" routerLinkActive="bg-blue-700"
         class="block px-3 py-2 rounded hover:bg-gray-700 transition-colors">Insights</a>
    </nav>
    <div class="p-4 border-t border-gray-700">
      <button (click)="logout()"
              class="w-full text-sm text-gray-400 hover:text-white transition-colors">
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-auto p-6">
    <router-outlet />
  </main>
</div>
