<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Session Logs</h1>
    <button (click)="devSeed()" [disabled]="seeding"
            class="bg-yellow-600 hover:bg-yellow-700 disabled:opacity-50 text-white text-sm px-4 py-2 rounded transition-colors">
      {{ seeding ? 'Seeding…' : 'DEV Seed' }}
    </button>
  </div>

  <!-- Filters -->
  <div class="bg-gray-800 p-4 rounded mb-4 grid grid-cols-2 lg:grid-cols-3 gap-3">
    <div>
      <label class="block text-xs text-gray-400 mb-1">From</label>
      <input type="datetime-local" [(ngModel)]="filters.from"
             class="w-full bg-gray-700 text-white rounded px-2 py-1.5 text-sm" />
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">To</label>
      <input type="datetime-local" [(ngModel)]="filters.to"
             class="w-full bg-gray-700 text-white rounded px-2 py-1.5 text-sm" />
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">Event Type</label>
      <input [(ngModel)]="filters.eventType" placeholder="e.g. page_view"
             class="w-full bg-gray-700 text-white rounded px-2 py-1.5 text-sm" />
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">Session Hash</label>
      <input [(ngModel)]="filters.sessionHash"
             class="w-full bg-gray-700 text-white rounded px-2 py-1.5 text-sm" />
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">User Segment</label>
      <input [(ngModel)]="filters.userSegment"
             class="w-full bg-gray-700 text-white rounded px-2 py-1.5 text-sm" />
    </div>
    <div class="flex items-end gap-2">
      <button (click)="search()"
              class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm px-3 py-1.5 rounded transition-colors">
        Search
      </button>
      <button (click)="exportCsv()"
              class="flex-1 bg-gray-600 hover:bg-gray-500 text-white text-sm px-3 py-1.5 rounded transition-colors">
        CSV
      </button>
      <button (click)="exportJson()"
              class="flex-1 bg-gray-600 hover:bg-gray-500 text-white text-sm px-3 py-1.5 rounded transition-colors">
        JSON
      </button>
    </div>
  </div>

  <div class="text-xs text-gray-500 mb-2">{{ totalElements }} total results</div>

  <table class="w-full text-sm">
    <thead class="text-gray-400 border-b border-gray-700">
      <tr>
        <th class="text-left py-2">ID</th>
        <th class="text-left py-2">Session Hash</th>
        <th class="text-left py-2">Timestamp</th>
        <th class="text-left py-2">Event Type</th>
        <th class="text-left py-2">Segment</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let log of logs" class="border-b border-gray-800 hover:bg-gray-800">
        <td class="py-2">{{ log.id }}</td>
        <td class="py-2 font-mono text-xs text-gray-400 truncate max-w-xs">{{ log.sessionHash }}</td>
        <td class="py-2 text-gray-400">{{ log.timestamp | date:'short' }}</td>
        <td class="py-2">{{ log.eventType }}</td>
        <td class="py-2 text-gray-400">{{ log.userSegment }}</td>
      </tr>
      <tr *ngIf="logs.length === 0">
        <td colspan="5" class="py-4 text-center text-gray-500">No logs. Try DEV Seed to add sample data.</td>
      </tr>
    </tbody>
  </table>
</div>
