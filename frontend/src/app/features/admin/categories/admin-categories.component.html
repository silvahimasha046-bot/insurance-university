<div>
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-bold">Category Hierarchy</h2>
    <span class="text-sm text-gray-400">
      {{ categories.length }} category(s), {{ subcategories.length }} subcategory(s)
    </span>
  </div>

  <div *ngIf="successMsg" class="mb-4 px-4 py-2.5 rounded bg-green-900/40 border border-green-700 text-green-300 text-sm">
    {{ successMsg }}
  </div>
  <div *ngIf="errorMsg" class="mb-4 px-4 py-2.5 rounded bg-red-900/40 border border-red-700 text-red-300 text-sm">
    {{ errorMsg }}
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <section class="bg-gray-800 border border-gray-700 rounded-lg p-5">
      <h3 class="font-semibold mb-3">Main Categories</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
        <input [(ngModel)]="categoryForm.code" placeholder="Code (e.g. LIFE_INSURANCE)"
          class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm" />
        <input [(ngModel)]="categoryForm.name" placeholder="Name"
          class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm" />
        <input [(ngModel)]="categoryForm.displayOrder" type="number" placeholder="Display order"
          class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm" />
        <label class="flex items-center gap-2 text-sm text-gray-300">
          <input type="checkbox" [(ngModel)]="categoryForm.active" class="accent-blue-500" /> Active
        </label>
      </div>
      <textarea [(ngModel)]="categoryForm.description" rows="2" placeholder="Description"
        class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm mb-3"></textarea>
      <div class="flex gap-2">
        <button (click)="saveCategory()" class="px-4 py-2 bg-blue-600 rounded text-sm font-semibold hover:bg-blue-700">
          {{ editingCategoryId ? 'Update Category' : 'Add Category' }}
        </button>
        <button *ngIf="editingCategoryId" (click)="resetCategoryForm()" class="px-4 py-2 bg-gray-600 rounded text-sm hover:bg-gray-500">
          Cancel
        </button>
      </div>

      <div class="mt-4 space-y-2">
        <div *ngFor="let c of categories" class="border border-gray-700 rounded p-3 flex items-start justify-between gap-3">
          <div>
            <div class="font-semibold">{{ c.name }}</div>
            <div class="text-xs text-gray-400 font-mono">{{ c.code }}</div>
            <div class="text-xs text-gray-400 mt-1">{{ c.description || 'No description' }}</div>
          </div>
          <div class="flex gap-2 text-xs">
            <button (click)="editCategory(c)" class="text-blue-400 hover:text-blue-300">Edit</button>
            <button (click)="removeCategory(c.id)" class="text-red-400 hover:text-red-300">Delete</button>
          </div>
        </div>
      </div>
    </section>

    <section class="bg-gray-800 border border-gray-700 rounded-lg p-5">
      <h3 class="font-semibold mb-3">Subcategories</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
        <select [(ngModel)]="subcategoryForm.categoryId" class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm">
          <option [ngValue]="null">Select Category</option>
          <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
        </select>
        <input [(ngModel)]="subcategoryForm.code" placeholder="Code (e.g. LIFE_PROTECTION_PLANS)"
          class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm" />
        <input [(ngModel)]="subcategoryForm.name" placeholder="Name"
          class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm" />
        <input [(ngModel)]="subcategoryForm.displayOrder" type="number" placeholder="Display order"
          class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm" />
        <label class="flex items-center gap-2 text-sm text-gray-300">
          <input type="checkbox" [(ngModel)]="subcategoryForm.active" class="accent-blue-500" /> Active
        </label>
      </div>
      <textarea [(ngModel)]="subcategoryForm.description" rows="2" placeholder="Description"
        class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm mb-3"></textarea>
      <div class="flex gap-2">
        <button (click)="saveSubcategory()" class="px-4 py-2 bg-blue-600 rounded text-sm font-semibold hover:bg-blue-700">
          {{ editingSubcategoryId ? 'Update Subcategory' : 'Add Subcategory' }}
        </button>
        <button *ngIf="editingSubcategoryId" (click)="resetSubcategoryForm()" class="px-4 py-2 bg-gray-600 rounded text-sm hover:bg-gray-500">
          Cancel
        </button>
      </div>

      <div class="mt-4 space-y-2">
        <div *ngFor="let s of subcategories" class="border border-gray-700 rounded p-3 flex items-start justify-between gap-3">
          <div>
            <div class="font-semibold">{{ s.name }}</div>
            <div class="text-xs text-gray-400 font-mono">{{ s.code }}</div>
            <div class="text-xs text-gray-400 mt-1">{{ s.category?.name || 'No category' }}</div>
          </div>
          <div class="flex gap-2 text-xs">
            <button (click)="editSubcategory(s)" class="text-blue-400 hover:text-blue-300">Edit</button>
            <button (click)="removeSubcategory(s.id)" class="text-red-400 hover:text-red-300">Delete</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
