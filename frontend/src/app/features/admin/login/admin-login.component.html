<div class="min-h-screen flex items-center justify-center bg-gray-900">
  <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-sm">
    <h1 class="text-2xl font-bold text-white mb-6 text-center">Admin Login</h1>

    <div *ngIf="error" class="bg-red-600 text-white text-sm p-3 rounded mb-4">{{ error }}</div>

    <div class="mb-4">
      <label class="block text-gray-300 text-sm mb-1">Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        class="w-full bg-gray-700 text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="admin@local"
      />
    </div>

    <div class="mb-6">
      <label class="block text-gray-300 text-sm mb-1">Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        (keyup.enter)="submit()"
        class="w-full bg-gray-700 text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="••••••••"
      />
    </div>

    <button
      (click)="submit()"
      [disabled]="loading"
      class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-semibold py-2 rounded transition-colors"
    >
      {{ loading ? 'Signing in…' : 'Sign In' }}
    </button>
  </div>
</div>
