<div class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen">
  <header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-slate-800">
    <div class="flex items-center p-3 justify-between">
      <div class="flex size-12 items-center cursor-pointer" routerLink="/wizard/step-3">
        <span class="material-symbols-outlined">arrow_back</span>
      </div>
      <h2 class="text-lg font-bold flex-1 text-center">Policy Results</h2>
      <div class="flex w-12 items-center justify-end">
        <span class="material-symbols-outlined">search</span>
      </div>
    </div>
  </header>

  <main class="p-4 pb-24 max-w-xl mx-auto">
    <h3 class="text-2xl font-bold">AI Recommended for You</h3>
    <p class="text-slate-500 dark:text-[#92adc9] text-sm mt-1">Based on your profile.</p>

    <div class="mt-6 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 bg-white dark:bg-[#192633] shadow-lg">
      <div class="p-4 flex justify-between items-start">
        <div>
          <p class="text-primary text-xs font-bold uppercase tracking-wider">Best Value Choice</p>
          <h4 class="text-lg font-bold">Smart Life Protector</h4>
          <p class="text-slate-500 dark:text-[#92adc9] text-xs mt-1">95% match</p>
        </div>
        <div class="text-right">
          <p class="text-lg font-extrabold">Rs. 4,250</p>
          <p class="text-slate-500 dark:text-[#92adc9] text-[10px]">per month</p>
        </div>
      </div>

      <div class="p-4 pt-0 flex gap-2">
        <button class="flex-1 h-10 rounded-lg bg-primary text-white font-bold" (click)="selectPlanAndGoCompare()">
          View Details
        </button>
        <button class="h-10 w-10 rounded-lg border border-slate-200 dark:border-slate-700">
          <span class="material-symbols-outlined">share</span>
        </button>
      </div>
    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/90 dark:via-background-dark/90 to-transparent">
    <button class="w-full h-14 rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold" routerLink="/recommendations/compare">
      <span class="material-symbols-outlined align-middle mr-2">compare_arrows</span>
      Compare Selected Plans
    </button>
  </div>
</div>
