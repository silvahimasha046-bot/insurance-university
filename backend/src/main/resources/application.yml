server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/insurance_university?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  config: classpath:log4j2.xml
  level:
    com.insuranceuniversity: DEBUG
    com.insuranceuniversity.backend.filter: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO

app:
  uploadsDir: "./uploads"
  aiEngineUrl: "${AI_ENGINE_URL:http://localhost:8000}"
  premium:
    taxRate: ${PREMIUM_TAX_RATE:0.0}
  jwt:
    secret: "InsuranceUniversitySecretKeyForJWTSigningMustBe256BitsLong!!"
    expirationMs: 86400000

admin:
  email: admin@local
  password: Admin@123
