server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/insurance_university?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  uploadsDir: "./uploads"
  jwt:
    secret: "InsuranceUniversitySecretKeyForJWTSigningMustBe256BitsLong!!"
    expirationMs: 86400000

admin:
  email: admin@local
  password: Admin@123
